# =============================================================================
# WenlianAPI Docker Compose - Test Server Instance
# =============================================================================
# Runs a second, isolated instance on the same VPS without touching production.
#
# Usage on server:
#   cd /root/wenlianapi/deploy
#   docker compose -p wenlianapi-test -f docker-compose.test-server.yml --env-file .env.test up -d --build
# =============================================================================

services:
  wenlianapi:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wenlianapi-test-app
    restart: unless-stopped
    ports:
      - "${TEST_BIND_HOST:-0.0.0.0}:${TEST_SERVER_PORT:-18080}:8080"
    volumes:
      - ./test_data/app:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=debug
      - RUN_MODE=${RUN_MODE:-standard}
      - DATABASE_HOST=wenlianapi-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-wenlianapi}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-wenlianapi}
      - DATABASE_SSLMODE=disable
      - REDIS_HOST=wenlianapi-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@test.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      wenlianapi-postgres:
        condition: service_healthy
      wenlianapi-redis:
        condition: service_healthy
    networks:
      - wenlianapi-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wenlianapi-postgres:
    image: postgres:18-alpine
    container_name: wenlianapi-test-postgres
    restart: unless-stopped
    volumes:
      - ./test_data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-wenlianapi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-wenlianapi}
      - PGDATA=/var/lib/postgresql/data
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - wenlianapi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wenlianapi} -d ${POSTGRES_DB:-wenlianapi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  wenlianapi-redis:
    image: redis:8-alpine
    container_name: wenlianapi-test-redis
    restart: unless-stopped
    volumes:
      - ./test_data/redis:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - wenlianapi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  wenlianapi-network:
    driver: bridge
