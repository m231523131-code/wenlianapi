name: Deploy wenlianapi

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/wenlianapi
  IMAGE_NAME: wenlianapi
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/wenlianapi:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.owner.outputs.value }}/wenlianapi:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Prepare deployment files
        run: |
          mkdir -p deploy-out
          cp deploy/docker-compose.prod.yml deploy-out/docker-compose.yml

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: deploy-out/docker-compose.yml
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        env:
          GHCR_OWNER: ${{ steps.owner.outputs.value }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          WENLIANAPI_ENV: ${{ secrets.WENLIANAPI_ENV }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: GHCR_OWNER,IMAGE_TAG,WENLIANAPI_ENV
          script: |
            set -eu
            mkdir -p /opt/wenlianapi
            cd /opt/wenlianapi

            printf '%s\n' "$WENLIANAPI_ENV" > .env
            chmod 600 .env

            docker login ghcr.io -u '${{ github.actor }}' -p '${{ secrets.GITHUB_TOKEN }}'
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG="$IMAGE_TAG" docker compose pull
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG="$IMAGE_TAG" docker compose up -d --remove-orphans
            docker image prune -f
